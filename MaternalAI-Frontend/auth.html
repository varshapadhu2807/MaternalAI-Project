<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maternal AI Login</title>

<link rel="stylesheet" href="login.css">
</head>

<body>

<div class="container">

<h1>🤱 Maternal AI</h1>

<div id="loginForm">

<h2>Login</h2>

<input
type="email"
id="loginEmail"
placeholder="Email">

<input
type="password"
id="loginPassword"
placeholder="Password">

<button onclick="login()">
Login
</button>

<p>
Don't have an account?

<a href="#" onclick="showRegister()">
Register
</a>
</p>

</div>

<div id="registerForm" style="display:none;">

<h2>Register</h2>

<input
type="text"
id="name"
placeholder="Name">

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="register()">
Register
</button>

<p>
Already have an account?

<a href="#" onclick="showLogin()">
Login
</a>
</p>

</div>

<p id="msg"></p>

</div>

<script src="login.js"></script>

</body>
</html>
